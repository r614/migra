[project]
name = "migra"
version = "4.0.0"
description = "Like `diff` but for PostgreSQL schemas"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Roshan Pawar", email = "roshan@r614.dev" },
]
dependencies = [
    "psycopg[binary]",
    "schemainspect",
]

[project.scripts]
migra = "migra:do_command"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
schemainspect = { workspace = true }
