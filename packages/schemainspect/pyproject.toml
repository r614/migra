[project]
name = "schemainspect"
version = "4.0.0"
description = "Schema inspection for PostgreSQL"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Roshan Pawar", email = "roshan@r614.dev" },
]
dependencies = [
    "psycopg[binary]",
]

[project.scripts]
schemainspect = "schemainspect:do_command"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["schemainspect"]
